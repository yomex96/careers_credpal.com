version: "3.9"

services:
  credpal-db:
    image: postgres:16-alpine
    container_name: credpal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: changethis123
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 10s
      timeout: 5s
      retries: 5

  credpal-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: credpal-app
    restart: unless-stopped
    depends_on:
      credpal-db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: credpal-db
      DB_USER: app
      DB_PASSWORD: changethis123
      DB_NAME: app
      DB_PORT: 5432
      PORT: 3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:


