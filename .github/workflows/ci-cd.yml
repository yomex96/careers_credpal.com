name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      # 1 Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2 Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3 Install dependencies
      - name: Install Dependencies
        run: npm ci

      # 4 Run tests
      - name: Run Tests
        run: npm test || echo "No tests found"

      # 5 Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6 Build Docker Image with two tags
      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/credpal-app:latest \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/credpal-app:${{ github.sha }} .

      # 7 Push Docker Images
      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/credpal-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/credpal-app:${{ github.sha }}

        