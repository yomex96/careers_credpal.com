name: CD Pipeline

on:
  push:
    branches:
      - prod   # Only deploy from prod branch

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production   # Requires manual approval

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Configure AWS credentials via OIDC (no hardcoded secrets)
      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::123456789012:role/GitHubActionsTerraform
          aws-region: us-east-2

      # 3️⃣ Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      # 4️⃣ Verify Terraform
      - name: Terraform Version
        run: terraform version

      # 5️⃣ Terraform Init
      - name: Terraform Init
        run: terraform init
        working-directory: infra/terraform

      # 6️⃣ Terraform Plan
      - name: Terraform Plan
        run: terraform plan -var="docker_image_tag=${{ github.sha }}"
        working-directory: infra/terraform

      # 7️⃣ Terraform Apply (manual approval)
      - name: Terraform Apply
        run: terraform apply -auto-approve -var="docker_image_tag=${{ github.sha }}"
        working-directory: infra/terraform
